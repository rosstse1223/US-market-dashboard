<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
    }
    #updated-time {
      font-size: 0.78rem;
      color: #6e7681;
    }

    .section-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .section-title {
      padding: 11px 16px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      background: #0d1117;
    }

    /* ── Scrollable wrapper for narrow screens ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 9px 14px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      background: #0d1117;
      white-space: nowrap;
    }
    thead th:not(:first-child) { text-align: center; }

    tbody tr {
      border-bottom: 1px solid #1c2128;
      transition: background .12s;
    }
    tbody tr:hover  { background: #1c2128; }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 10px 14px; white-space: nowrap; }
    td:not(:first-child) { text-align: center; }

    /* ── Ticker ── */
    .ticker-sym  { font-weight: 700; font-size: .84rem; color: #e6edf3; font-family: 'Courier New', monospace; }
    .ticker-full { font-size: .70rem; color: #8b949e; margin-top: 2px; }

    /* ── Price ── */
    .price-val { font-family: 'Courier New', monospace; font-size: .84rem; color: #e6edf3; }

    /* ── Change badges ── */
    .chg {
      display: inline-block;
      min-width: 64px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: .78rem;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }
    .chg-pos  { background: rgba(35,134,54,.22);   color: #3fb950; }
    .chg-neg  { background: rgba(248,81,73,.18);   color: #f85149; }
    .chg-zero { background: rgba(110,118,129,.12); color: #8b949e; }

    /* ── MA pills ── */
    .ma-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .71rem;
      font-weight: 600;
      min-width: 72px;
      justify-content: center;
    }
    .ma-above-up   { background: rgba(35,134,54,.28);  color: #3fb950; border: 1px solid rgba(63,185,80,.28); }
    .ma-above-down { background: rgba(210,153,34,.22); color: #d9a400; border: 1px solid rgba(210,153,34,.28); }
    .ma-below-up   { background: rgba(219,109,40,.22); color: #db6d28; border: 1px solid rgba(219,109,40,.28); }
    .ma-below-down { background: rgba(248,81,73,.20);  color: #f85149; border: 1px solid rgba(248,81,73,.28); }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid #21262d;
      background: #0d1117;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .69rem;
      color: #6e7681;
    }

    .loading-msg { padding: 28px; text-align: center; color: #6e7681; font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>📊 Market Dashboard</h1>
  <span id="updated-time">Loading…</span>
</header>

<div class="section-card">
  <div class="section-title">📈 Indices — EOD Snapshot · Prev Close</div>

  <div class="table-wrap">
    <table id="indices-table">
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Price</th>
          <th>Daily Chg</th>
          <th>Intraday Chg<br><small style="font-weight:400;text-transform:none;letter-spacing:0">(Open → Close)</small></th>
          <th>EMA 10</th>
          <th>EMA 20</th>
          <th>SMA 50</th>
          <th>SMA 200</th>
        </tr>
      </thead>
      <tbody id="indices-body">
        <tr><td colspan="8" class="loading-msg">⏳ Loading indices data…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="ma-pill ma-above-up">▲ Above</span>  Price &gt; MA &amp; MA rising</div>
    <div class="legend-item"><span class="ma-pill ma-above-down">▼ Above</span> Price &gt; MA &amp; MA falling</div>
    <div class="legend-item"><span class="ma-pill ma-below-up">▲ Below</span>  Price &lt; MA &amp; MA rising</div>
    <div class="legend-item"><span class="ma-pill ma-below-down">▼ Below</span> Price &lt; MA &amp; MA falling</div>
  </div>
</div>

<script>
  function fmtChg(val) {
    if (val == null) return '<span class="chg chg-zero">N/A</span>';
    const sign = val > 0 ? '+' : '';
    const cls  = val > 0 ? 'chg-pos' : val < 0 ? 'chg-neg' : 'chg-zero';
    return `<span class="chg ${cls}">${sign}${val.toFixed(2)}%</span>`;
  }

  function maPill(tag) {
    const map = {
      above_up:   { cls: 'ma-above-up',   label: '▲ Above' },
      above_down: { cls: 'ma-above-down', label: '▼ Above' },
      below_up:   { cls: 'ma-below-up',   label: '▲ Below' },
      below_down: { cls: 'ma-below-down', label: '▼ Below' },
    };
    const m = map[tag] || { cls: 'chg-zero', label: 'N/A' };
    return `<span class="ma-pill ${m.cls}">${m.label}</span>`;
  }

  async function loadIndices() {
    try {
      const res  = await fetch('data/indices.json?v=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();

      document.getElementById('updated-time').textContent =
        '🕒 Last updated: ' + (json.updated || 'unknown');

      const tbody = document.getElementById('indices-body');
      tbody.innerHTML = '';

      if (!json.indices || json.indices.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="loading-msg">No data found.</td></tr>';
        return;
      }

      json.indices.forEach(row => {
        const fmt = (n) => n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="ticker-sym">${row.ticker}</div>
            <div class="ticker-full">${row.name}</div>
          </td>
          <td><span class="price-val">${fmt(row.price)}</span></td>
          <td>${fmtChg(row.daily_chg)}</td>
          <td>${fmtChg(row.intraday_chg)}</td>
          <td>${maPill(row.ema10)}</td>
          <td>${maPill(row.ema20)}</td>
          <td>${maPill(row.sma50)}</td>
          <td>${maPill(row.sma200)}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      document.getElementById('indices-body').innerHTML =
        `<tr><td colspan="8" class="loading-msg">❌ Error loading data: ${err.message}</td></tr>`;
    }
  }

  loadIndices();
</script>

</body>
</html>
